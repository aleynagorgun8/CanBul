name: canbul
description: "A new Flutter project."
publish_to: 'none' # Private package

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  font_awesome_flutter: 10.4.0
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.0.0
  image_picker: ^0.8.7+5
  permission_handler: ^11.3.1
  dotted_border: ^2.1.0
  app_links: ^6.0.0
  intl: ^0.20.2
  google_maps_flutter: ^2.5.0
  geocoding: ^3.0.0
  geolocator: ^13.0.2
  http: ^1.1.0
  url_launcher: ^6.3.0
  timeago: ^3.7.1
  flutter_launcher_icons: ^0.13.1
  image_cropper: ^5.0.1
  path_provider: ^2.1.2
  shared_preferences: ^2.3.3


flutter_launcher_icons:
  android: "launcher_icon" # Android için ikon dosya ismini belirler
  ios: false # iOS için de ikon üretilsin mi?
  image_path: "assets/icon/icon.png" # İkon dosyamızın yolu
  min_sdk_android: 21



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/cat.png
    - assets/images/dog.png
